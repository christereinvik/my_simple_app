name: Flutter iOS Debug Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Unsigned iOS Debug
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install
          cd ..
          # Nøkkelen til suksess: debug-kommandoen krever ALDRI utviklerteam eller Apple-sertifikater
          flutter build ios --debug --no-codesign

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-output
          path: build/ios/iphoneos/Runner.app/
