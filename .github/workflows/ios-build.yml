name: Flutter iOS Release Build for Sideloadly

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Unsigned iOS Release
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install
          cd ..
          # Bygger i Release-modus i stedet for Debug, slik at appen kan åpnes på iOS 14+
          flutter build ios --release --no-codesign

      - name: Package IPA for Sideloadly
        run: |
          # Oppretter den påkrevde Payload-mappestrukturen for iOS-apper
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          # Zipper det sammen til en ferdig .ipa-fil i rotmappen
          zip -r ../../Runner.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/Runner.ipa

