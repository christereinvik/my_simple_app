name: Flutter iOS Profile Build for Sideloadly

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Unsigned iOS Profile
        run: |
          flutter pub get
          cd ios
          pod repo update
          pod install
          cd ..
          # Vi bruker --profile i stedet for release for å hoppe over Apples team- og sertifikatkrav i skyen
          flutter build ios --profile --no-codesign

      - name: Package IPA for Sideloadly
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/profile-iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ../../Runner.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-profile-ipa
          path: build/Runner.ipa
