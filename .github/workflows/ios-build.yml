name: Flutter iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build iOS App Bundle
        run: |
          flutter precache --ios
          flutter pub get
          
          # Sletter Windows-Podfilen slik at den ikke lager krøll
          rm -f ios/Podfile
          
          # Tvinger Flutter til å generere en helt ren og riktig iOS-mappe/Podfile for Mac
          flutter create . --platforms=ios
          
          cd ios
          # Legger inn GPS-tillatelsen i den nygenererte Podfilen automatisk via terminalen
          echo "post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['\$(inherited)', 'PERMISSION_LOCATION=1']
              end
            end
          end" >> Podfile
          
          pod repo update
          pod install
          cd ..
          
          # Bygger for simulator uten krav til kodesignering
          flutter build ios --simulator --no-codesign

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: build/ios/archive.xcarchive/Products/Applications/Runner.app
