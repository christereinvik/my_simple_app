name: Flutter iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build iOS App Bundle
        run: |
          flutter precache --ios
          flutter pub get
          cd ios
          pod repo update
          pod install
          cd ..
          # Vi endrer 'ios' til 'ipa' og beholder no-codesign for Sideloadly
          flutter build ipa --no-codesign

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          # Banen til den usignerte .ipa-filen
          path: build/ios/ipa/*.ipa

